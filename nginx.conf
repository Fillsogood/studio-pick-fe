# 1️⃣ HTTP 요청 → HTTPS 리디렉션
server {
    listen 80;
    server_name studio.studiopick.p-e.kr;

    # 모든 HTTP 요청을 HTTPS로 리디렉션
    return 301 https://$host$request_uri;
}

# 2️⃣ 실제 HTTPS 서비스 처리
server {
    listen 443 ssl;
    server_name studio.studiopick.p-e.kr;

    # 🔐 Let's Encrypt 인증서 경로
    ssl_certificate /etc/letsencrypt/live/studio.studiopick.p-e.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.studiopick.p-e.kr/privkey.pem;

    # 정적 파일 경로
    root /usr/share/nginx/html;
    index index.html;

    # Vite SPA 라우팅 대응
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자원 캐싱
    location ~* \.(?:css|js|json|jpg|jpeg|png|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # 🔁 API 요청 프록시 (백엔드 EC2)
    location /api/ {
        proxy_pass http://172.31.38.231:8080;  # ← 내부 백엔드 IP
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
